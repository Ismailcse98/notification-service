[program:laravel-worker]
process_name=%(program_name)s_%(process_num)02d

command=php /var/www/artisan queue:work redis --queue=notifications,default --sleep=3 --tries=3 --timeout=90

autostart=true
autorestart=true
stopasgroup=true
killasgroup=true

numprocs=2

redirect_stderr=true
stdout_logfile=/var/www/storage/logs/worker.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5

stopwaitsecs=3600